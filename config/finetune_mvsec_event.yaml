pretrained: ./ckpt/model.pt

seed: 0
benchmark: false
mixed_precision: bf16

batch_size: 1
accum_iter: 1
epochs: 10
start_epoch: 0
lr: 1e-4
min_lr: 1e-6
warmup_epochs: 0.2
weight_decay: 0.05
clip_grad: 1.0

num_workers: 4
pin_mem: true
print_freq: 10
log_freq: 10
save_every_steps: 500
eval_every_steps: 500

save_dir: ./checkpoints
exp_name: mvsec_event_finetune
logdir: ${save_dir}/${exp_name}/logs
output_dir: ${save_dir}/${exp_name}

model:
  img_size: 518
  patch_size: 14
  embed_dim: 1024
  event_hidden_dim: 32
  head_frames_chunk_size: 2

train:
  unfreeze_heads: true
  unfreeze_aggregator_blocks: true

loss:
  pose_weight: 1.0
  depth_weight: 1.0
  points_weight: 1.0
  points_loss_type: "l1"
  align_depth_scale: false
  depth_min: 1.0e-6
  depth_max: null

vis:
  save_every_steps: 200
  frame_index: 0
  sample_index: 0

data:
  root: /data1/lzh/dataset/mvsec
  num_views: 6
  resolution: [518, 392]
  fps: 20
  camera: left
  davis_group: davis
  depth_key: depth_image_rect
  pose_key: pose
  event_format: xytp
  event_spatial_transform: none
  event_resize_method: voxel_antialias
  event_resize_bins: 10
  return_debug_event_fields: false
  sequence_names: null
  intrinsics: null  # Set [fx, fy, cx, cy] or a 3x3 matrix if MVSEC calibration is not stored in hdf5.
  test_frame_count: 20
  event_vis_only: false
  event_vis_max_batches: 1

hydra:
  verbose: false
  run:
    dir: ${output_dir}
